name: Build and Publish PyPi Packages
run-name: ${{ format('Release {0}', inputs.release_type)}} Package by @${{ github.actor }}
on:
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        description: The type of release
        options:
        - Major
        - Minor
        - Patch
      publish_vulnerabilities:
        type: string
        default: "true"
      vulnerability_failure_severity:
        description: The severity to fail the workflow if such vulnerability is detected. DO NOT override it unless a Jira ticket is raised. Must be one of ['CRITICAL', 'CRITICAL,HIGH' or 'CRITICAL,HIGH,MEDIUM'] (without space in between).
        type: string
        default: 'CRITICAL,HIGH'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10","3.11","3.12","3.13"]
    
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Run unit tests
      run: |
        python -m unittest tests/*.py

  approve-publish:
    name: Approve publish
    needs: unit-tests
    runs-on: ubuntu-latest
    environment: sdk-publish-approval
    steps:
      - run: echo "Publish approved"

  build-and-pubish:
    name: Build and publish Python packages to PyPi
    needs: approve-publish
    uses: IABTechLab/uid2-shared-actions/.github/workflows/shared-publish-to-pypi-versioned.yaml@v3
    with:
      release_type: ${{ inputs.release_type }}
      publish_vulnerabilities: ${{ inputs.publish_vulnerabilities }}
      vulnerability_failure_severity: ${{ inputs.vulnerability_failure_severity }}
      merge_environment: ${{ github.ref_protected && 'ci-auto-merge' || '' }}
    secrets: inherit
